<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TradeBaby Pro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" id="theme-color-meta" content="#C8E6F5">
<meta name="description" content="TradeBaby Pro — Complete Forex Trading Academy by SayMy Tech. Learn, practice, journal, master trading. Fully offline PWA.">
<title>TradeBaby Pro</title>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/screens.css">
</head>
<body>

<!-- ═══ SPLASH SCREEN ═══ -->
<div id="splash">
  <div class="splash-mesh"></div>
  <div class="splash-lines"></div>
  <div class="splash-corner tl"></div>
  <div class="splash-corner tr"></div>
  <div class="splash-corner bl"></div>
  <div class="splash-corner br"></div>
  <canvas id="splash-canvas" style="position:absolute;inset:0;pointer-events:none;opacity:0.3"></canvas>
  <div class="splash-content">
    <img src="icons/icon.svg" class="splash-logo" alt="TradeBaby Pro"
         onerror="this.style.display='none'">
    <div class="splash-brand">
      TradeBaby
      <span>Pro Academy</span>
    </div>
    <div class="splash-tagline">Trade · Learn · Master</div>
    <div class="splash-bar-wrap">
      <div class="splash-bar-track">
        <div class="splash-bar-fill" id="splash-fill"></div>
      </div>
      <div class="splash-msg" id="splash-msg">Loading academy...</div>
    </div>
  </div>
  <div class="splash-version">v10 · SayMy Tech Developers</div>
</div>

<!-- ═══ ONBOARDING ═══ -->
<div id="onboarding" style="display:none">
  <div class="onboard-container">
    <div class="onboard-header">
      <div class="onboard-progress-track">
        <div class="onboard-progress-fill" id="ob-progress" style="width:0%"></div>
      </div>
    </div>
    <div class="onboard-body" id="ob-body"></div>
  </div>
</div>

<!-- ═══ MAIN APP SHELL ═══ -->
<div id="app" style="display:none;opacity:0">

  <!-- Notification bar (top alerts) -->
  <div id="notify-bar"></div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Main scrollable content area -->
  <main id="screen-wrap">
    <div id="screen"></div>
  </main>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <nav id="bottom-nav">
    <div class="nav-grid">
      <button class="nav-item active" id="ni-home" onclick="navigate('home')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Home</span>
      </button>

      <button class="nav-item" id="ni-learn" onclick="navigate('learn')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
        </span>
        <span class="nav-label">Learn</span>
      </button>

      <button class="nav-item" id="ni-trade" onclick="navigate('trade')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
            <polyline points="16 7 22 7 22 13"/>
          </svg>
        </span>
        <span class="nav-label">Trade</span>
      </button>

      <button class="nav-item" id="ni-journal" onclick="navigate('journal')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </span>
        <span class="nav-label">Journal</span>
      </button>

      <button class="nav-item" id="ni-more" onclick="showMoreMenu()">
        <span class="nav-icon" style="position:relative">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          <span id="mentor-dot" style="display:none;position:absolute;top:-3px;right:-4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg)"></span>
        </span>
        <span class="nav-label">More</span>
      </button>
    </div>
  </nav>

  <!-- ═══ MORE MENU DRAWER ═══ -->
  <div id="more-menu-backdrop"
    style="display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)"
    onclick="closeMoreMenu()">
    <div id="more-menu-drawer"
      style="position:absolute;bottom:0;left:0;right:0;max-width:540px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--bdr2);padding:6px 16px calc(env(safe-area-inset-bottom,0px) + 24px);animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)"
      onclick="event.stopPropagation()">
      <div style="width:40px;height:3px;background:var(--bdr2);border-radius:2px;margin:12px auto 16px"></div>
      <div style="font-family:var(--display);font-weight:900;font-size:18px;margin-bottom:14px;letter-spacing:-.3px">More Tools</div>
      <div id="more-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px"></div>
    </div>
  </div>

  <!-- ═══ FLOATING AI CHAT BUTTON — Draggable ═══ -->
  <div id="float-btn-wrap" style="position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + var(--nav-h,60px) + 16px);right:16px;z-index:600;touch-action:none">
  <button id="float-btn" onclick="handleFloatBtnClick(event)"
    aria-label="Open AI Mentor"
    style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#0070D8,#0050A8);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,112,216,0.45);cursor:grab;transition:transform .15s">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  </button>
  </div>

  <!-- ═══ FLOAT CHAT PANEL — Draggable, keyboard-safe ═══ -->
  <div id="float-chat-panel"
    style="display:none;flex-direction:column;position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + var(--nav-h,60px) + 12px);right:10px;left:10px;max-width:480px;margin-left:auto;z-index:601;background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;box-shadow:0 16px 48px rgba(0,0,0,0.7);overflow:hidden;height:min(520px,calc(100dvh - var(--nav-h,62px) - 120px))">

    <!-- Drag handle bar -->
    <div id="float-drag-handle" style="padding:6px;display:flex;justify-content:center;cursor:grab;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr3);touch-action:none"
      ontouchstart="floatDragStart(event)" ontouchmove="floatDragMove(event)" ontouchend="floatDragEnd(event)"
      onmousedown="floatDragStartMouse(event)">
      <div style="width:36px;height:4px;background:var(--bdr2);border-radius:2px"></div>
    </div>
    <!-- Chat header -->
    <div style="padding:10px 14px;background:linear-gradient(135deg,var(--accent-d,#007A6A),var(--accent,#00D4B8));display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:15px">🤖</div>
        <div>
          <div style="font-family:var(--display);font-weight:800;font-size:13px;color:#fff">TradeMind AI</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.75)">Drag handle ↑ to move</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="minimizeFloatChat()" style="background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:12px" title="Minimize">—</button>
        <button onclick="toggleFloatChat()" style="background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:12px" title="Close">✕</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="float-messages" style="flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0"></div>

    <!-- Quick suggestions -->
    <div id="float-suggestions" style="display:flex;gap:5px;overflow-x:auto;padding:6px 10px;border-top:1px solid var(--bdr2);scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch"></div>

    <!-- Input bar -->
    <div style="display:flex;gap:7px;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom,8px));border-top:1px solid var(--bdr2);flex-shrink:0;background:var(--bg2)">
      <input id="float-input"
        style="flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--bdr2);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--txt);outline:none;font-family:inherit"
        placeholder="Ask me anything..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendFloatMsg();}">
      <button onclick="sendFloatMsg()"
        style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--amber,#F59E0B),var(--amber-d,#92400E));color:#0C0C10;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(245,158,11,0.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ═══ MODAL ═══ -->
  <div id="modal-backdrop" onclick="closeModal()"
    style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)">
    <div id="modal-content" onclick="event.stopPropagation()"
      style="position:absolute;bottom:0;left:0;right:0;max-width:540px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--bdr2);padding:6px 20px calc(env(safe-area-inset-bottom,0px) + 24px);max-height:92vh;overflow-y:auto">
    </div>
  </div>

  <!-- ═══ INSTALL BANNER ═══ -->
  <div id="install-banner"
    style="display:none;position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + var(--nav-h,60px) + 10px);left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:420px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r,12px);padding:12px 16px;align-items:center;gap:12px;z-index:650;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideUp .4s ease">
    <img src="icons/icon.svg" width="38" height="38" style="border-radius:10px;flex-shrink:0">
    <div style="flex:1;min-width:0">
      <div style="font-family:var(--display);font-weight:700;font-size:13px">Install TradeBaby Pro</div>
      <div style="font-size:11px;color:var(--txt2)">Works fully offline · Add to home screen</div>
    </div>
    <button onclick="triggerInstall()" class="btn btn-amber" style="width:auto;padding:8px 14px;font-size:12px;flex-shrink:0">Install</button>
    <button onclick="document.getElementById('install-banner').style.display='none'"
      style="background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px;font-size:18px;flex-shrink:0;line-height:1">✕</button>
  </div>

</div><!-- /#app -->

<!-- ═══ JAVASCRIPT — FULLY MODULAR ═══ -->
<!-- Load order matters: state → data → curriculum → chatbot → notifications → screens → systems → app (boot last) -->
<script src="js/state.js"></script>
<script src="js/data.js"></script>
<script src="js/curriculum.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/notifications.js"></script>
<script src="js/screens/home.js"></script>
<script src="js/screens/learn.js"></script>
<script src="js/screens/trade.js"></script>
<script src="js/screens/journal.js"></script>
<script src="js/screens/mentor.js"></script>
<script src="js/screens/profile.js"></script>
<script src="js/ai_brain.js"></script>
  <script src="js/v8_systems.js"></script>
<script src="js/analysis_guides.js"></script>
<script src="js/trading_encyclopedia.js"></script>
<script src="js/market_data_extended.js"></script>
<script src="js/quiz_bank.js"></script>
<script src="js/extended_content.js"></script>
<script src="js/app.js"></script>

</body>
</html>
