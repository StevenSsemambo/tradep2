<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0C0C10">
<title>TradeBaby Pro — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;background:#0C0C10;color:#F0EFE8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
  background-image:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(245,158,11,0.08) 0%,transparent 70%),
  radial-gradient(ellipse 50% 60% at 70% 60%,rgba(245,158,11,0.04) 0%,transparent 70%)}
  .logo{font-size:56px;margin-bottom:16px}
  h1{font-size:28px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
  p{color:#9B9891;font-size:14px;line-height:1.6;max-width:320px;margin:0 auto 24px}
  .btn{display:inline-block;padding:12px 28px;background:#F59E0B;color:#0C0C10;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;cursor:pointer;border:none}
  .note{font-size:11px;color:#5E5C58;margin-top:16px;font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
  <div>
    <div class="logo">📡</div>
    <h1>You're Offline</h1>
    <p>TradeBaby Pro needs a connection to load for the first time. Once loaded, it works completely offline.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="note">TradeBaby Pro v10 · SayMy Tech</div>
  </div>
</body>
</html>
